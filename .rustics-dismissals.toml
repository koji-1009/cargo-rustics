# Dismissals for self-application. Each entry must include a `reason`
# of at least 20 characters explaining why the lens's signal is wrong
# *here*, not generally. Stale entries (no longer matching any live
# violation) surface as `staleDismissals:` warnings on the next run.

[[dismissals]]
file = "crates/cargo-rustics/src/unused.rs"
scope = "unused::pub_decl"
metric = "match-arm-count"
reason = """
Dispatch over `syn::Item` variants — each arm reads a different field \
(`i.sig.ident` for Fn, `i.ident` for Struct/Enum/Trait/…). Collapsing \
into a data table would require either a macro that hides the field \
diversity (no readability win) or a wrapper enum (more code, same \
shape). The width is a property of `syn::Item`'s breadth, not of our \
function — refactor cost > readability gain."""
by = "claude-opus-4-7"
at = "2026-05-08"

# rustics::input / measurement / metric / visitor are the Layer-1
# core types: every metric calculator uses MetricInput, returns
# MetricMeasurement, implements MetricCalculator (in metric.rs), and
# walks the AST via visitor helpers. High Ca on these is the
# stability they were designed for — Martin's metric specifically
# names this case as "main-sequence-correct" (high Ca + high A is
# fine; this would only be a smell if A were low). The signal is
# correct as a *change-impact* indicator (modifying these types
# affects N callers) but does not call for a refactor.
[[dismissals]]
file = "crates/rustics/src/input.rs"
scope = "input"
metric = "afferent-coupling"
reason = """
Layer-1 core type `MetricInput`: every metric calculator takes one. \
High Ca = "modifying this surface ripples through every lens", which \
is exactly the stability Martin's metric is asking us to maintain. \
The right response is "do not break this without thought", not \
"refactor"."""
by = "claude-opus-4-7"
at = "2026-05-09"

