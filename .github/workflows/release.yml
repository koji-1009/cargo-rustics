name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag (e.g. v0.1.0). Leave empty to dry-run."
        required: false

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # The release-gate job re-runs the same checks CI runs on `main`. Tagged
  # releases must first be green on CI; this job is a defence in depth so
  # we never publish a build that wouldn't pass `cargo rustics analyze`
  # against itself.
  gate:
    name: gate (fmt + clippy + test + self-application)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features
      - run: cargo install --path crates/cargo-rustics --locked --debug
      - run: cargo rustics analyze --fatal-warnings

  publish-cratesio:
    name: publish to crates.io
    runs-on: ubuntu-latest
    needs: gate
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # Order matters: the `rustics` library is a dependency of
      # `cargo-rustics`, so it has to be published first.
      - run: cargo publish -p rustics --token "${CARGO_REGISTRY_TOKEN}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: cargo publish -p cargo-rustics --token "${CARGO_REGISTRY_TOKEN}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: github release with binaries
    runs-on: ${{ matrix.os }}
    needs: gate
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}
      - name: build
        run: cargo build --release --bin cargo-rustics --target ${{ matrix.target }}
      - name: package (unix)
        if: runner.os != 'Windows'
        run: |
          set -eu
          cd target/${{ matrix.target }}/release
          tar czf "../../../cargo-rustics-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" cargo-rustics
      - name: package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Location target/${{ matrix.target }}/release
          Compress-Archive -Path cargo-rustics.exe -DestinationPath "..\..\..\cargo-rustics-${{ github.ref_name }}-${{ matrix.target }}.zip"
      - name: upload to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            cargo-rustics-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            cargo-rustics-${{ github.ref_name }}-${{ matrix.target }}.zip
          fail_on_unmatched_files: false
