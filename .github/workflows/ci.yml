name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features

  coverage:
    name: line coverage on every workspace crate
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: lcov.info
      # Plan §12.5 — 100% line coverage on lib/. We gate the whole
      # workspace at 90% as a regression guard while individual crates
      # ratchet toward 100%. The runtime-uncoverable parts (proc-macro
      # entry, LSP stdio main()) are explicitly listed in AGENTS.md.
      - run: cargo llvm-cov --workspace --fail-under-lines 90

  self-application:
    name: cargo rustics analyze --fatal-warnings (self-application gate)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install --path crates/cargo-rustics --locked
      - run: cargo rustics analyze --fatal-warnings
      # M2 onwards:
      # - run: cargo rustics regression --before main --after HEAD --fatal-warnings

  license-audit:
    name: cargo-deny licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses bans
